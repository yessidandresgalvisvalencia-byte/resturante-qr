<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Restaurante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Menú del Restaurante</h1>
        <h2 id="mesaActual">Mesa</h2>

        <div class="card estado-card">
            <h3>Estado de tu pedido</h3>
            <p id="estadoPedido">Esperando pedido...</p>
            <p id="tiempoPedido"></p>
        </div>

        <div class="card cuenta-card">
            <h3>Cuenta de tu mesa</h3>
            <p id="subtotalMesa">Subtotal: $0</p>

            <label>Propina</label>
            <select id="propinaSelect">
                <option value="0">0%</option>
                <option value="10">10%</option>
                <option value="15">15%</option>
                <option value="20">20%</option>
            </select>

            <p id="valorPropina">Propina: $0</p>
            <p id="totalMesa">Total: $0</p>
            <button onclick="verFactura()">Ver factura</button>
            
        </div>

        <div class="card">
            <h3>Método de pago</h3>
            <select id="metodoPago">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia</option>
                <option value="pse">PSE</option>
                <option value="tarjeta">Tarjeta</option>
            </select>
        </div>

        <div class="card">
            <h3>Atención</h3>
            <button onclick="llamarMesero()">Llamar al mesero</button>
        </div>

        <h2>Menú</h2>
        <div id="menuLista"></div>

        <h2>Tus pedidos</h2>
        <div id="misPedidos" class="grid"></div>
        

        <h2>Factura</h2>
        <div id="facturaBox" class="card"></div>
    </div>

    <script src="/socket.io/socket.io.js">
        function Factura() {
            const factura = 
            document.getElementById("facturaBox");
            if (factura) {
                factura.scrollIntoView({
                    behavior: "smooth"
            });
            }
        }
 </script>
    <script src="script.js"></script>
</body>
</html>

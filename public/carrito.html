<script>
  const carrito = [
    { nombre: "Hamburguesa", precio: 15000 },
    { nombre: "Papas", precio: 5000 }
  ];

  const listaCarrito = document.getElementById("lista-carrito");
  const totalSpan = document.getElementById("total");
  let total = 0;

  carrito.forEach(item => {
    total += item.precio;
    listaCarrito.innerHTML += `
      <div class="item">
        <span>${item.nombre}</span>
        <span>$${item.precio}</span>
      </div>
    `;
  });

  totalSpan.textContent = total;

  document.getElementById("pagar").addEventListener("click", async () => {
    try {
      const montoEnCentavos = total * 100;

      const resp = await fetch("/pagos/crear-pago", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          monto: montoEnCentavos
        })
      });

      const data = await resp.json();
      console.log("Respuesta backend:", data);

      if (!data.ok) {
        alert(data.error || "No se pudo crear el pago");
        return;
      }

      if (
        !data.publicKey ||
        !data.currency ||
        !data.amountInCents ||
        !data.reference ||
        !data.signature
      ) {
        console.error("Datos incompletos para Wompi:", data);
        alert("Faltan datos para abrir Wompi. Revisa la consola.");
        return;
      }

      const form = document.createElement("form");
      form.action = "https://checkout.wompi.co/p/";
      form.method = "GET";

      const fields = [
        { name: "public-key", value: data.publicKey },
        { name: "currency", value: data.currency },
        { name: "amount-in-cents", value: String(data.amountInCents) },
        { name: "reference", value: data.reference },
        { name: "signature:integrity", value: data.signature },
        { name: "redirect-url", value: data.redirectUrl }
      ];

      fields.forEach(field => {
        if (field.value !== undefined && field.value !== null && field.value !== "") {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = field.name;
          input.value = field.value;
          form.appendChild(input);
        }
      });

      document.body.appendChild(form);
      form.submit();
    } catch (error) {
      console.error("Error al enviar a Wompi:", error);
      alert("Hubo un error enviando el pago. Mira la consola.");
    }
  });
</script>

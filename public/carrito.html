<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito - BiteQR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 30px;
    }

    .contenedor {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .total {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: right;
    }

    #pagar {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      background: #16a34a;
      color: white;
      display: block;
    }

    #pagar:hover {
      background: #15803d;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Carrito</h1>

    <div id="lista-carrito"></div>

    <div class="total">
      Total: $<span id="total">0</span>
    </div>

    <button id="pagar">Pagar pedido</button>
  </div>

  <script>
    const carrito = [
      { nombre: "Hamburguesa", precio: 15000 },
      { nombre: "Papas", precio: 5000 }
    ];

    const listaCarrito = document.getElementById("lista-carrito");
    const totalSpan = document.getElementById("total");
    let total = 0;

    carrito.forEach(item => {
      total += item.precio;
      listaCarrito.innerHTML += `
        <div class="item">
          <span>${item.nombre}</span>
          <span>$${item.precio}</span>
        </div>
      `;
    });

    totalSpan.textContent = total;

    document.getElementById("pagar").addEventListener("click", async () => {
      try {
        const montoEnCentavos = total * 100;

        const resp = await fetch("/pagos/crear-pago", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            monto: montoEnCentavos
          })
        });

        const data = await resp.json();
        console.log("Respuesta backend:", data);

        if (!data.ok) {
          alert(data.error || "No se pudo crear el pago");
          return;
        }

        if (
          !data.publicKey ||
          !data.currency ||
          !data.amountInCents ||
          !data.reference ||
          !data.signature
        ) {
          console.error("Datos incompletos para Wompi:", data);
          alert("Faltan datos para abrir Wompi. Revisa la consola.");
          return;
        }
const params = new URLSearchParams({
  "public-key": data.publicKey,
  "currency": data.currency,
  "amount-in-cents": String(data.amountInCents),
  "reference": data.reference,
  "signature:integrity": data.signature,
  "redirect-url": data.redirectUrl
});

const wompiUrl = `https://checkout.wompi.co/p/?${params.toString()}`;
console.log("URL Wompi:", wompiUrl);
console.log("respuesta backend:", data)
alert(wompiUrl);
return;
window.location.href = wompiUrl;   
      } catch (error) {
        console.error("Error al enviar a Wompi:", error);
        alert("Hubo un error enviando el pago. Mira la consola.");
      }
    });
  </script>
</body>
</html>

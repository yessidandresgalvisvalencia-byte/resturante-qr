<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Modo Mesero</h1>

        <div class="card">
            <label>Restaurant ID</label>
            <input id="restaurantIdInput" type="text" value="rest1">
            <button onclick="cargarMesero()">Actualizar</button>
        </div>

        <h2>Llamados pendientes</h2>
        <div id="listaLlamados" class="grid"></div>

        <h2>Pedidos listos para entregar</h2>
        <div id="listaListos" class="grid"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="mesero.js"></script>
</body>
</html>
<script>
  const meseroId = localStorage.getItem("meseroId");
  const meseroRestaurantId = localStorage.getItem("meseroRestaurantId");

  if (!meseroId || !meseroRestaurantId) {
    window.location.href = "/login-mesero.html";
  }
</script>

<script src="/socket.io/socket.io.js"></script>
<script src="mesero.js"></script>

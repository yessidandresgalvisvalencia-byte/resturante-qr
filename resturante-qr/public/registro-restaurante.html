<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Crear Restaurante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body {
font-family: Arial, sans-serif;
background: #f5f5f5;
margin: 0;
padding: 30px 15px;
}

.contenedor {
max-width: 600px;
margin: auto;
}

.card {
background: #fff;
padding: 25px;
border-radius: 14px;
box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

input {
width: 100%;
padding: 12px;
margin-top: 8px;
margin-bottom: 15px;
border-radius: 8px;
border: 1px solid #ddd;
}

button {
width: 100%;
padding: 14px;
border: none;
border-radius: 10px;
background: black;
color: white;
font-size: 16px;
cursor: pointer;
}

button:hover {
background: #222;
}

.precio {
font-size: 22px;
font-weight: bold;
margin: 10px 0 20px;
}

.estado {
margin-top: 15px;
font-size: 14px;
}

.ok { color: green; }
.bad { color: red; }
</style>
</head>

<body>

<div class="contenedor">
<div class="card">

<h2>Crear restaurante</h2>

<input id="nombre" placeholder="Nombre del restaurante" />
<input id="correo" placeholder="Correo" />
<input id="usuario" placeholder="Usuario admin" />
<input id="password" type="password" placeholder="Contraseña" />

<h3>Plan mensual</h3>
<div class="precio">$1.500 COP</div>

<h3>Datos de pago</h3>
<input id="cardNumber" placeholder="Número de tarjeta" />
<input id="expMonth" placeholder="Mes (MM)" />
<input id="expYear" placeholder="Año (YYYY)" />
<input id="cvc" placeholder="CVC" />
<input id="cardName" placeholder="Nombre en la tarjeta" />

<button onclick="crearCuentaYPagar()" id="btnPagar">
Crear cuenta y pagar
</button>

<p style="font-size:13px; color:#555; text-align:center; margin-top:10px;">
Pago seguro con Wompi • Activación inmediata
</p>

<div id="estadoProceso" class="estado"></div>

</div>
</div>

<script>
async function crearCuentaYPagar() {
const btn = document.getElementById("btnPagar");
const estado = document.getElementById("estadoProceso");

btn.disabled = true;
estado.innerHTML = "Iniciando proceso...";

try {
const nombre = document.getElementById("nombre").value;
const correo = document.getElementById("correo").value;
const usuario = document.getElementById("usuario").value;
const password = document.getElementById("password").value;

const cardNumber = document.getElementById("cardNumber").value;
const expMonth = document.getElementById("expMonth").value;
const expYear = document.getElementById("expYear").value;
const cvc = document.getElementById("cvc").value;
const cardName = document.getElementById("cardName").value;








const publicKey = "pub_prod_Oh0v6IoZ1mad01tKxchx0uTmzN4LVtEy"; // 🔴 PON TU PUBLIC KEY REAL

// 🔥 1. Obtener acceptance_token
estado.innerHTML = "Conectando con Wompi...";

const merchantRes = await fetch(`https://production.wompi.co/v1/merchants/${publicKey}`);
const merchantData = await merchantRes.json();

const acceptanceToken =
merchantData?.data?.presigned_acceptance?.acceptance_token;

if (!acceptanceToken) {
console.log("merchantData:", merchantData);
throw new Error("No se obtuvo acceptance token");
}

// 🔥 2. Tokenizar tarjeta
estado.innerHTML = "Tokenizando tarjeta...";

const tokenRes = await fetch("https://production.wompi.co/v1/tokens/cards", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
number: cardNumber,
cvc: cvc,
exp_month: expMonth,
exp_year: expYear,
card_holder: cardName
})
});

const tokenData = await tokenRes.json();

if (!tokenData.data) {
console.log(tokenData);
throw new Error("Error tokenizando tarjeta");
}

const paymentMethodToken = tokenData.data.id;

// 🔥 3. Enviar al backend
estado.innerHTML = "Creando cuenta y procesando pago...";

const res = await fetch("/api/registro-y-fuente-pago", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
nombre,
correo,
usuario,
password,
acceptanceToken,
paymentMethodToken,
customerEmail: correo
})
});

const data = await res.json();

if (!res.ok || !data.ok) {
console.log(data);
throw new Error(data.error || "Error en el servidor");
}

estado.innerHTML = "<span class='ok'>Cuenta creada y pago realizado ✅</span>";
alert("Restaurante activado correctamente 🚀");

} catch (error) {
console.error(error);
estado.innerHTML = "<span class='bad'>Error: " + error.message + "</span>";
alert("Error: " + error.message);
} finally {
btn.disabled = false;
}
}
</script>

</body>
</html>
